services:
  - type: web
    name: fnf-x-creator
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: TRUST_PROXY
        value: "true"
